<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Women's Day Express 2026 🚂</title>
    <link rel="stylesheet" href="style.css">
</head><body>
    
    <div class="sky">
        <h1 class="main-title">
            Ladies Special: <span id="coach-count">0</span> Coaches
        </h1>
    
        <div class="train-group">
            <div class="engine-unit">
                <div class="banner">WOMEN'S EXPRESS 🌸</div>
                <div class="steam-box">
                    <div class="steam s1">💨</div>
                    <div class="steam s2">💨</div>
                    <div class="steam s3">💨</div>
                    <div class="steam s4">💨</div>
                </div>
                <div class="engine-emoji">🚂</div>
            </div>

            <div id="carriage-container">
                </div>
        </div>
    </div>

    <div class="container">
        <div class="upload-card">
            <h2>Add to the Express 📸</h2>
            
            <input type="text" id="senderName" placeholder="Your Name (e.g., xyz)">
            <input type="text" id="receiverName" placeholder="Relation (e.g., Aunt)">
            <textarea id="msg" rows="2" placeholder="Your Message..."></textarea>
            
            <label for="photoInput" class="file-label" id="fileLabel">Choose Photo 📷</label>
            <input type="file" id="photoInput" accept="image/*">
            
            <button id="submitBtn">Attach to Train 🚂</button>
        </div>
        
        <div id="wall" class="wish-grid"></div>
    </div>

    <script type="module" src="script.js"></script>
    
</body>
</html>
